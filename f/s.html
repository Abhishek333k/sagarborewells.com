<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Hub | Sagar Borewells</title>
    <link rel="stylesheet" href="/assets/css/style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="/assets/js/config.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: white; }
        .sci-card { 
            background: rgba(30, 41, 59, 0.7); 
            border: 1px solid rgba(255,255,255,0.05); 
            backdrop-filter: blur(12px); 
            border-radius: 16px; 
            padding: 24px; 
            transition: 0.3s; 
            display: flex; flex-direction: column; justify-content: space-between;
        }
        .sci-card:hover { border-color: rgba(56, 189, 248, 0.3); transform: translateY(-2px); box-shadow: 0 10px 30px -10px rgba(56,189,248,0.1); }
        .sci-input { 
            background: rgba(15, 23, 42, 0.6); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; padding: 12px 16px; color: white; width: 100%; outline: none; transition: 0.2s; 
        }
        .sci-input:focus { border-color: #38bdf8; box-shadow: 0 0 0 2px rgba(56,189,248,0.2); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="pt-12 pb-8 px-6 text-center">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-sky-500/10 text-sky-400 mb-4">
            <i class="ri-flask-line text-3xl"></i>
        </div>
        <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight mb-2">Engineering Hub</h1>
        <p class="text-slate-400 max-w-lg mx-auto">Professional calculators and estimators for borewell drilling, pump sizing, and hydraulic engineering.</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-2 gap-6">
        
        <div class="sci-card">
            <div>
                <div class="flex items-center gap-3 mb-6">
                    <i class="ri-exchange-line text-2xl text-sky-400"></i>
                    <h2 class="text-xl font-bold">Quick Converter</h2>
                </div>
                <div class="flex flex-wrap gap-2 mb-4">
                    <button onclick="setConvMode('ft_m')" class="conv-btn bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded text-sm text-slate-300 active-conv">Ft to M</button>
                    <button onclick="setConvMode('m_ft')" class="conv-btn bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded text-sm text-slate-300">M to Ft</button>
                    <button onclick="setConvMode('hp_kw')" class="conv-btn bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded text-sm text-slate-300">HP to kW</button>
                    <button onclick="setConvMode('kw_hp')" class="conv-btn bg-slate-800 hover:bg-slate-700 px-3 py-1 rounded text-sm text-slate-300">kW to HP</button>
                </div>
                <input type="number" id="convInput" class="sci-input text-xl font-mono mb-4" placeholder="Enter value" onkeyup="calcConv()">
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl text-center border border-slate-800">
                <div id="convResult" class="text-3xl font-black text-sky-400 font-mono">0.00</div>
                <div id="convUnit" class="text-xs text-slate-500 uppercase tracking-widest mt-1">Meters</div>
            </div>
        </div>

        <div class="sci-card">
            <div>
                <div class="flex items-center gap-3 mb-6">
                    <i class="ri-shape-2-line text-2xl text-amber-400"></i>
                    <h2 class="text-xl font-bold">Annular Gravel Volume</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Bore Dia (in)</label>
                        <input type="number" id="gravelBore" class="sci-input" placeholder="e.g. 6.5" onkeyup="calcGravel()">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Pipe Dia (in)</label>
                        <input type="number" id="gravelCasing" class="sci-input" placeholder="e.g. 5" onkeyup="calcGravel()">
                    </div>
                </div>
                <div class="mb-6">
                    <label class="text-xs text-slate-400 block mb-1">Depth of Gravel Pack (ft)</label>
                    <input type="number" id="gravelDepth" class="sci-input" placeholder="e.g. 200" onkeyup="calcGravel()">
                </div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl text-center border border-slate-800">
                <div id="gravelResult" class="text-2xl font-black text-amber-400 font-mono">--</div>
                <div class="text-xs text-slate-500 uppercase tracking-widest mt-1">Cubic Feet (CFT)</div>
            </div>
        </div>

        <div class="sci-card">
            <div>
                <div class="flex items-center gap-3 mb-6">
                    <i class="ri-flashlight-line text-2xl text-emerald-400"></i>
                    <h2 class="text-xl font-bold">Cable Sizing (3-Phase)</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Motor (HP)</label>
                        <input type="number" id="cableHP" class="sci-input" placeholder="e.g. 5" onkeyup="calcCable()">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Length (m)</label>
                        <input type="number" id="cableLen" class="sci-input" placeholder="e.g. 100" onkeyup="calcCable()">
                    </div>
                </div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl text-center border border-slate-800">
                <div class="text-xs text-slate-500 uppercase tracking-widest mb-1">Recommended Copper Core</div>
                <div id="resCable" class="text-2xl font-black text-emerald-400 font-mono">-- mm²</div>
            </div>
        </div>

        <div class="sci-card">
            <div>
                <div class="flex items-center gap-3 mb-6">
                    <i class="ri-timer-line text-2xl text-purple-400"></i>
                    <h2 class="text-xl font-bold">Tank Fill Estimator</h2>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Pump Yield (LPH)</label>
                        <input type="number" id="tankFlow" class="sci-input" placeholder="e.g. 5000" onkeyup="calcTank()">
                    </div>
                    <div>
                        <label class="text-xs text-slate-400 block mb-1">Tank Size (Liters)</label>
                        <input type="number" id="tankSize" class="sci-input" placeholder="e.g. 2000" onkeyup="calcTank()">
                    </div>
                </div>
            </div>
            <div class="bg-slate-900/50 p-4 rounded-xl text-center border border-slate-800">
                <div id="resTank" class="text-2xl font-black text-purple-400 font-mono">--</div>
                <div class="text-xs text-slate-500 uppercase tracking-widest mt-1">Estimated Time</div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. CONVERTER ---
        let convMode = 'ft_m';
        function setConvMode(mode) {
            convMode = mode;
            document.querySelectorAll('.conv-btn').forEach(b => {
                b.style.color = '#cbd5e1'; 
                b.style.borderColor = 'transparent';
            });
            event.target.style.color = '#38bdf8';
            calcConv();
        }
        function calcConv() {
            const val = parseFloat(document.getElementById('convInput').value);
            const disp = document.getElementById('convResult');
            const unit = document.getElementById('convUnit');
            if(!val) { disp.innerText = "0.00"; return; }

            if(convMode === 'ft_m') { disp.innerText = (val * 0.3048).toFixed(2); unit.innerText = "Meters"; } 
            else if(convMode === 'm_ft') { disp.innerText = (val * 3.28084).toFixed(2); unit.innerText = "Feet"; } 
            else if(convMode === 'hp_kw') { disp.innerText = (val * 0.7457).toFixed(2); unit.innerText = "Kilowatts (kW)"; } 
            else if(convMode === 'kw_hp') { disp.innerText = (val * 1.341).toFixed(2); unit.innerText = "Horsepower (HP)"; }
        }
        setConvMode('ft_m');

        // --- 2. GRAVEL CALCULATOR ---
        function calcGravel() {
            const D = parseFloat(document.getElementById('gravelBore').value);
            const d = parseFloat(document.getElementById('gravelCasing').value);
            const h = parseFloat(document.getElementById('gravelDepth').value);
            if(!D || !d || !h) { document.getElementById('gravelResult').innerText = '--'; return; }
            const cft = h * ( (D*D) - (d*d) ) / 183.35;
            document.getElementById('gravelResult').innerText = Math.max(0, cft).toFixed(1);
        }

        // --- 3. CABLE SIZING ---
        function calcCable() {
            const hp = parseFloat(document.getElementById('cableHP').value);
            const len = parseFloat(document.getElementById('cableLen').value);
            if(!hp || !len) { document.getElementById('resCable').innerText = '-- mm²'; return; }
            let size = 1.5;
            if (hp <= 2) { size = len < 250 ? 1.5 : (len < 400 ? 2.5 : 4); } 
            else if (hp <= 5) { size = len < 200 ? 2.5 : (len < 350 ? 4 : 6); } 
            else if (hp <= 7.5) { size = len < 200 ? 4 : (len < 300 ? 6 : 10); } 
            else { size = len < 150 ? 6 : (len < 250 ? 10 : 16); }
            document.getElementById('resCable').innerText = size + " mm²";
        }

        // --- 4. TANK TIMER ---
        function calcTank() {
            const flow = parseFloat(document.getElementById('tankFlow').value);
            const size = parseFloat(document.getElementById('tankSize').value);
            if(!flow || !size) { document.getElementById('resTank').innerText = '--'; return; }
            const time = (size / flow) * 60;
            if(time > 60) {
                const hrs = Math.floor(time / 60);
                const mins = Math.round(time % 60);
                document.getElementById('resTank').innerText = `${hrs}h ${mins}m`;
            } else {
                document.getElementById('resTank').innerText = `${Math.round(time)} mins`;
            }
        }
    </script>
</body>
</html>
